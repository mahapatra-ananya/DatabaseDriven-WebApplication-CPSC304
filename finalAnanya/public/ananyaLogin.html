<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

<h2>Please enter your details to log in.</h2>
<form id="loginTable">
  Username: <input type="text" id="Username" placeholder="Enter Username" required maxlength="30"> <br><br>
  Password: <input type="password" id="Password" placeholder="Enter Password" required maxlength="50"> <br><br>

  <button type="submit"> Log In </button> <br>

  <!-- must have error handling for non-existing usernames, or mismatched username and password -->

</form>
<div id="loginResultMsg"></div>

<p>OR</p>
<a href="ananyaCreateAccount.html">
    <button>Create Account Instead</button>
</a> <br/><br/><hr/><br/>
<h2>Show All Accounts</h2>
<table id="allAccounts" border="1">
    <thead>
    <tr>
        <!--Table head, need to be adjusted accordingly to align with your own.-->
        <th>Username</th>
        <th>Display Name</th>
        <th>Password</th>
        <th>Bio</th>
        <th>Region</th>
        <th>AvatarID</th>
        <th>PlanID</th>
    </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script src="ananyaLoginScript.js"></script>

</body>
</html>
