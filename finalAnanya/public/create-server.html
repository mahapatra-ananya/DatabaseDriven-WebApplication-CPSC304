    <h1>Create a Server</h1>
<form id="insertServer">
    <div class="formComponent">
        <label for="insertServerName" style="display:block">Enter a Server Name</label>
        <input type="text" id="insertServerName" placeholder="Server Name" required>
    </div>
    <div class="formComponent">
        <label for="insertAvatar">Select a Server Avatar</label>
        <div id="insertAvatar">
        </div>
    </div>
    <div class="formComponent">
        <label for="insertChannelGroup">Add Channels</label>
        <div id="insertChannelGroup">
            <input type="text" class="newChannel" placeholder="Channel Name" required/>
        </div>
        <a href='#' id="addChannelBtn">+ Channel</a>
    </div>
    <div class="formComponent">
        <label for="insertTag">Enter an admin tag</label>
        <input type="text" id="insertTag" placeholder="Admin Tag"/>
    </div>
    <div class="formComponent">
        <label for="insertSignature">Enter a signature for this server</label>
        <input type="text" id="insertSignature" placeholder="Server Signature"/>
    </div>
    <button id="createServerBtn" type="submit">Create Server</button>
</form>

<div id="onInsertServerSuccess">
    <p>You have successfully created the <span id="successServerName"></span> Server!</p>
    <p>Select 'Next' to go to your server's page</p>
    <button id="nextBtn">Next</button>
</div>

<script src="./create-server-script.js"></script>
