<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Account</title>
</head>
<body>

<div>
  <a href="ananyaHome.html">
    <button>
      <img src="home_icon.png" alt="HomeIcon" width="50" height="50">
    </button>
  </a>
</div>

<br>

<form id="editAccountTable">
<!--  don't allow to edit username as it is the PK -->
  Password: <input type="password" id="Password" maxlength="50"> <br><br>
  Display Name: <input type="text" id="DisplayName" placeholder="Current Display Name" maxlength="30"> <br><br>
  Bio: <input type="text" id="Bio" placeholder="Current Bio" maxlength="250"> <br><br>
  <!--    Region: <input type="text" id="Region" placeholder="Placeholder until dropdowns" maxlength="50"> <br><br>-->
  <!--    We don't need country because region will give us country-->

  <label for="region">Choose a region:</label>
  <select name="Region" id="region">
    <option value="Select">Select</option>
    <option value="Vancouver">Vancouver</option>
    <option value="Burnaby">Burnaby</option>
    <option value="Ottawa">Ottawa</option>
    <option value="Virginia">Virginia</option>
    <option value="Odisha">Odisha</option>
  </select>

  <p>Choose an avatar:</p>

  <button> <img src="generic_pfp.jpg" alt="Avatar1" width="50" height="50"> </button>
  <button> <img src="generic_pfp.jpg" alt="Avatar2" width="50" height="50"> </button>
  <button> <img src="generic_pfp.jpg" alt="Avatar3" width="50" height="50"> </button>
  <button> <img src="generic_pfp.jpg" alt="Avatar4" width="50" height="50"> </button>
  <button> <img src="generic_pfp.jpg" alt="Avatar5" width="50" height="50"> </button>
  <button> <img src="generic_pfp.jpg" alt="Avatar10" width="50" height="50"> </button>
  <br>
  <br> <br>
  <button type="submit"> Save </button> <br>

</form>

</body>
</html>
