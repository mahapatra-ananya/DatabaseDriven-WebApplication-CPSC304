<!-- Display the current status of the database connection.
     !!HERE TO HELP U DEBUGGING, NOT REQUIRED IN YOUR OWN PROJECT!!
     -->
<h1>Database Connection Status:
    <!-- An in-line placeholder to display connection status. -->
    <span id="dbStatus"> </span>
    <!-- A loading GIF, will be hided once get the status. -->
    <img id="loadingGif" class="loading-gif" src="loading_100px.gif" alt="Loading...">
</h1>

<br><hr><br> <!-- ========================================================================= -->

<!-- Show 'Demotable'.
    Data will be fetched and inserted here dynamically using JavaScript. -->
<h2>Show Calendar table</h2>
<table id="Calendartable" border="1">
    <thead>
    <tr>
        <!--Table head, need to be adjusted accordingly to align with your own.-->
        <th>CalendarID</th>
        <th>CalendarName</th>
        <th>UserName</th>
    </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<br><hr><br> <!-- ========================================================================= -->

<h2> Insert Values into Calendar table </h2>
<form id="insertCalendartable">
    CalendarID: <input type="number" step="1" id="insertCalendarId" placeholder="Enter Calendar ID" required> <br><br>
    CalendarName: <input type="text" id="insertCalendarName" placeholder="Enter Calendar Name" maxlength="20"> <br><br>
    UserName: <input type="text" id="insertUserName" placeholder="Enter User Name" maxlength="20"> <br><br>
    <button type="submit"> insert </button> <br>
</form>
<div id="insertResultMsg"></div>

<a href="Calendar.html">
    <button id = "goToCalendar">Calendar </button> </a>
