    <h2> Create an Event </h2>
    <form id="insertEventtable">
        EventID: <input type="number" step="1" min = "1" id="insertEventId" placeholder="Enter Event ID" required> <br><br>
        EventName: <input type="text" id="insertEventName" placeholder="Enter Event Name" maxlength="20" required> <br><br>

        Duration: <input type="number" id="insertEventDuration" placeholder="Enter Event Duration"> <br><br>
        Details: <input type="text" id="insertEventDetail" placeholder="Enter Event Details" maxlength="250"> <br><br>
        EventUserName: <input type="text" id="insertEventUserName" placeholder="Enter Event User Name" maxlength="20"> <br><br>
